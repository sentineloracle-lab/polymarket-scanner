name: Polymarket Scanner Cron

on:
  schedule:
    - cron: '0 * * * *'  # S'exécute toutes les heures (pile à l'heure)
  workflow_dispatch:      # Permet le lancement manuel depuis l'onglet Actions

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Scanner Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          LLM_PROVIDER: "groq"
        run: python main.py

      - name: Commit and Push CSV changes
        run: |
          git config --global user.name "Scanner Bot"
          git config --global user.email "bot@github.com"
          # On ajoute scan_history.csv mais aussi opportunities_found.csv si vous l'avez activé
          git add scan_history.csv || true
          git add opportunities_found.csv || true
          # Le [skip ci] évite que le bot ne déclenche un nouveau scan en boucle
          git commit -m "📈 Hourly Market Analysis Update [skip ci]" || exit 0
          git push
