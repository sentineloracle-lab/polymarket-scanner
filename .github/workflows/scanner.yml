name: Polymarket Scanner Cron

on:
  schedule:
    - cron: '0 */4 * * *'  # S'exécute toutes les 4 heures
  workflow_dispatch:      # Permet le lancement manuel pour test

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Scanner Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          LLM_PROVIDER: "groq"
        run: python main.py

      - name: Commit and Push CSV changes
        run: |
          git config --global user.name "Scanner Bot"
          git config --global user.email "bot@github.com"
          git add scan_history.csv
          # Le [skip ci] est crucial pour ne pas déclencher un build infini
          git commit -m "📈 Update Scan History (via Groq) [skip ci]" || exit 0
          git push
