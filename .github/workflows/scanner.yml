name: Polymarket Scanner Cron

on:
  schedule:
    # Lance le script toutes les 4 heures
    - cron: '0 */4 * * *'
  # Permet aussi de le lancer manuellement depuis l'interface GitHub (bouton "Run workflow")
  workflow_dispatch:

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    
    permissions:
      # Donne la permission d'écrire dans le repo (pour sauvegarder le CSV)
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Scanner Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
        run: python main.py

      - name: Commit and Push CSV changes
        # Cette étape sauvegarde le fichier scan_history.csv sur ton repo
        run: |
          git config --global user.name "Scanner Bot"
          git config --global user.email "bot@github.com"
          git add scan_history.csv
          # On ne commit que s'il y a des changements
          git commit -m "📈 Update Scan History" || exit 0
          git push
